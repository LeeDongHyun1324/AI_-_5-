server:
  port: 8080

spring:
  application:
    name: bookapp

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bookdb
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: my-secret-key-my-secret-key-my-secret-key
  expiration: 86400000

aes:
  secret-key: 1234567890123456