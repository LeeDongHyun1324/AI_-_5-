server:
  port: 8080

spring:
  application:
    name: bookapp

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./db/bookdb
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true